apiVersion: batch/v1
kind: Job
metadata:
  name: moodle-init

spec:
  backoffLimit: 1

  template:
    spec:
      restartPolicy: Never

      containers:
        - name: init
          image: alpine:3.19

          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache wget tar
              cd /tmp

              wget -O moodle.tgz "https://download.moodle.org/download.php/direct/stable404/moodle-latest-404.tgz"
              tar -xzf moodle.tgz

              cp -a moodle/. /data/


              echo "DONE"

          volumeMounts:
            - name: moodle-code
              mountPath: /data

      volumes:
        - name: moodle-code
          persistentVolumeClaim:
            claimName: moodle-pvc
