kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: lab
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 80
    hostPort: 80         # Fixed: Changed from 8080 to 80
    protocol: TCP
  - containerPort: 443
    hostPort: 443        # Added: Missing secure routing port
    protocol: TCP
- role: worker
