# nginx deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:stable
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: moodle-code
          mountPath: /var/www/html  
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config

      - name: moodle-code
        persistentVolumeClaim:
          claimName: moodle-pvc    
