#configuration for PHP-FPM and Moodle support

server {
    listen 80;
    server_name pglearn.panglobal.org;

    root /var/www/html;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handle PHP requests
    location ~ \.php$ {
        include fastcgi.conf;
        fastcgi_pass 127.0.0.1:9000;  # Connect to PHP-FPM outside Docker
        fastcgi_index index.php;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;  # Update PHP version as needed
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
